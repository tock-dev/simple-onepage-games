<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Red Ball demake</title>
  <style>
    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    .not-connected {
      color: red;
    }

    .connected {
      color: green;
    }

    div:has(canvas) {
      width: 100%;
      height: 80%;
      overflow: hidden;
    }

    div canvas {
      width: 100%;
      height: 100%;
      display: block;
      border: 4px inset black;
      box-sizing: border-box;
    }
  </style>
</head>

<body>
  <div>Status: <span class="not-connected">Not connected</span></div>
  <div>
    <canvas></canvas>
  </div>
  <script>
    const statusSpan = document.querySelector('.not-connected')
    const canvas = document.querySelector('canvas')
    const ctx = canvas.getContext('2d')
    let gamepad
    let mainloopInterval

    const container = canvas.parentElement
    canvas.width = container.clientWidth
    canvas.height = container.clientHeight
    window.addEventListener('resize', () => {
      canvas.width = container.clientWidth
      canvas.height = container.clientHeight
    });

    const player = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      dx: 0, dy: 0,
      move: function () {
        this.x += this.dx
        this.y += this.dy
      },
      get onFloor() {
        return this.y + playerDiameter >= canvas.height
      }
    }
    const playerSpeed = 0.5
    const maxSpeed = 10
    const playerDiameter = 50
    const friction = 0.05
    const frictionDeadzone = 0.01
    const gravity = 0.2
    const jumpForce = 10
    const bounciness = 0.2

    window.addEventListener('gamepadconnected', (e) => {
      statusSpan.className = 'connected'
      statusSpan.textContent = 'Connected: ' + e.gamepad.id

      gamepad = e.gamepad
      mainloopInterval = setInterval(mainloop, 1000 / 60)
    });

    window.addEventListener('gamepaddisconnected', (e) => {
      statusSpan.className = 'not-connected'
      statusSpan.textContent = 'Not connected'

      gamepad = null
      clearInterval(mainloopInterval)
    });

    function mainloop() {
      if (!gamepad) return
      gamepad = navigator.getGamepads()[gamepad.index]
      player.dx += playerSpeed * gamepad.axes[0]
      player.dx *= (1 - friction)
      if (player.onFloor) player.dy = -jumpForce * gamepad.buttons[1].value
      else player.dy += gravity
      if (Math.abs(player.dx) < frictionDeadzone) player.dx = 0
      player.move()

      if (player.x < 0) {
        player.x = 0
        player.dx = -(player.dx * bounciness)
      }
      if (player.x + playerDiameter > canvas.width) {
        player.x = canvas.width - playerDiameter
        player.dx = -(player.dx * bounciness)
      }
      if (player.y < 0) {
        player.y = 0
        player.dy = -(player.dy * bounciness)
      }
      if (player.y + playerDiameter > canvas.height) {
        player.y = canvas.height - playerDiameter
        player.dy = -(player.dy * bounciness)
      }

      if (player.dx > maxSpeed) player.dx = maxSpeed
      if (player.dx < -maxSpeed) player.dx = -maxSpeed
      if (player.dy > maxSpeed) player.dy = maxSpeed
      if (player.dy < -maxSpeed) player.dy = -maxSpeed

      ctx.clearRect(0, 0, canvas.width, canvas.height)
      ctx.beginPath()
      ctx.fillStyle = 'red'
      ctx.arc(
        player.x + playerDiameter / 2,
        player.y + playerDiameter / 2,
        playerDiameter / 2, 0, Math.PI * 2
      )
      ctx.fill()

      ctx.strokeText(`x: ${player.x.toFixed(2)}, y: ${player.y.toFixed(2)}, dx: ${player.dx.toFixed(2)}, dy: ${player.dy.toFixed(2)}, cwidth: ${canvas.width}, cheight: ${canvas.height}`, 10, 10)
    }
  </script>
</body>

</html>
